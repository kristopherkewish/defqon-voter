name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires the CLOUDFLARE_API_TOKEN repo secret (see README). The token only
    # needs Workers deploy permissions — D1 migrations are applied manually (the
    # D1 binding is referenced by id, so deploy itself doesn't touch D1 data).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Type-check + build the client and worker.
      - run: npm run build

      # Deploy using the build's redirected wrangler config (account_id is in wrangler.jsonc).
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
