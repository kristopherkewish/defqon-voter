name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires the CLOUDFLARE_API_TOKEN repo secret (see README). Until it is
    # added, this workflow will fail at the Cloudflare steps — that is expected.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Apply any new D1 migrations (idempotent; uses the repo's wrangler.jsonc).
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply defqon-voter-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Type-check + build the client and worker.
      - run: npm run build

      # Deploy using the build's redirected wrangler config (account_id is in wrangler.jsonc).
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
